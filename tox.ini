[tox]
envlist = py311, ruff, bandit, pip-audit
skip_missing_interpreters = true

[testenv]
deps =
    .
    pytest>=7.0
commands = pytest {posargs}

[testenv:ruff]
deps = ruff>=0.4
commands = ruff check slan_cuan/ tests/

[testenv:ruff-format]
deps = ruff>=0.4
commands = ruff format slan_cuan/ tests/

[testenv:bandit]
deps = bandit
commands = bandit -r slan_cuan/ -ll

[testenv:pip-audit]
deps =
    .
    pip-audit
skip_install = true
commands_pre = python -m pip install --upgrade pip setuptools
commands = pip-audit --skip-editable
