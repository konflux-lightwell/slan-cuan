---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: slan-cuan-extract
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/categories: Build
    tekton.dev/displayName: "slan-cuan: Extract PNC Artifacts"
    tekton.dev/pipelines.minVersion: "0.50.0"
    tekton.dev/platforms: "linux/amd64"
    tekton.dev/tags: "release,maven,extract"
spec:
  description: >-
    Extract Java artifacts from a PNC container image.
  params:
    - name: IMAGE
      description: PNC container image reference to extract artifacts from.
      type: string
    - name: REGISTRY_AUTH_SECRET
      description: K8s Secret name for registry auth (.dockerconfigjson format).
      type: string
      default: "registry-auth"
    - name: FORCE
      description: Overwrite existing output directory if it exists.
      type: string
      default: "false"
    - name: ociStorage
      description: The OCI repository where the Trusted Artifact is stored.
      type: string
      default: "empty"
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifact in the OCI repository.
      type: string
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls.
      type: string
      default: ""
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: "trusted-ca"
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the CA bundle data.
      type: string
      default: "ca-bundle.crt"
    - name: catalogGitUrl
      description: The url to the git repo where the release-service-catalog stepactions are stored.
      type: string
      default: https://github.com/arewm/release-service-catalog.git
    - name: catalogGitRevision
      description: The revision in the catalogGitUrl repo to be used.
      type: string
      default: lightwell-pipeline
  results:
    - name: sourceDataArtifact
      description: OCI artifact reference for the extracted source data.
    - name: MANIFEST_DIGEST
      description: OCI manifest digest of the extracted image.
    - name: DELIVERABLE_DIR
      description: Name of the deliverable directory inside the artifact.
    - name: sourceDataArtifact
      description: Trusted Artifact URI of the extracted artifact directory.
      type: string
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: false
    env:
      - name: REQUESTS_CA_BUNDLE
        value: /etc/pki/tls/cert.pem
  steps:
    - name: run
      image: quay.io/light-castle/slan-cuan:latest
      imagePullPolicy: Always
      args:
        - extract
      env:
        - name: SLAN_CUAN_EXTRACT_IMAGE
          value: $(params.IMAGE)
        - name: SLAN_CUAN_EXTRACT_OUTPUT_DIR
          value: /var/workdir/extracted
        - name: SLAN_CUAN_EXTRACT_REGISTRY_AUTH_FILE
          value: /auth/.dockerconfigjson
        - name: SLAN_CUAN_EXTRACT_FORCE
          value: $(params.FORCE)
        - name: SLAN_CUAN_TEKTON_RESULTS_DIR
          value: $(step.results)
      volumeMounts:
        - name: registry-auth
          mountPath: /auth
          readOnly: true
    - name: create-trusted-artifact
      ref:
        resolver: git
        params:
          - name: url
            value: $(params.catalogGitUrl)
          - name: revision
            value: $(params.catalogGitRevision)
          - name: pathInRepo
            value: stepactions/create-trusted-artifact/create-trusted-artifact.yaml
      params:
        - name: ociStorage
          value: $(params.ociStorage)
        - name: workDir
          value: /var/workdir/extracted
        - name: sourceDataArtifact
          value: $(results.sourceDataArtifact.path)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: caCertPath
          value: /mnt/trusted-ca/$(params.caTrustConfigMapKey)
  volumes:
    - name: workdir
      emptyDir: {}
    - name: registry-auth
      secret:
        secretName: $(params.REGISTRY_AUTH_SECRET)
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        optional: true
