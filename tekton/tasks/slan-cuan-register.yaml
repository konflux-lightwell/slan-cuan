---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: slan-cuan-register
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/categories: Security
    tekton.dev/displayName: "slan-cuan: Register SBOM (Trustify)"
    tekton.dev/pipelines.minVersion: "0.50.0"
    tekton.dev/platforms: "linux/amd64"
    tekton.dev/tags: "release,sbom,trustify,security"
spec:
  description: >-
    Register SBOM with Trustify for continuous CVE cross-referencing.
  params:
    - name: TRUSTIFY_API_URL
      description: Trustify instance API URL.
      type: string
    - name: SSO_TOKEN_URL
      description: OIDC token endpoint URL.
      type: string
    - name: SSO_SECRET_NAME
      description: K8s Secret name with keys client-id and client-secret.
      type: string
      default: "trustify-sso"
    - name: INSECURE
      description: Disable TLS verification (true/false).
      type: string
      default: "false"
    - name: RETRIES
      description: Number of retry attempts for API calls.
      type: string
      default: "3"
    - name: CA_CERT_SECRET
      description: K8s Secret name for custom CA cert (optional).
      type: string
      default: ""
    - name: CA_CERT_PATH
      description: Path to the CA certificate file inside the mounted secret.
      type: string
      default: ""
    - name: sourceDataArtifact
      description: Trusted Artifact URI of the extracted artifact directory from slan-cuan-extract.
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifact is stored.
      type: string
      default: "empty"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls.
      type: string
      default: ""
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: "trusted-ca"
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the CA bundle data.
      type: string
      default: "ca-bundle.crt"
    - name: catalogGitUrl
      description: The url to the git repo where the release-service-catalog stepactions are stored.
      type: string
      default: https://github.com/arewm/release-service-catalog.git
    - name: catalogGitRevision
      description: The revision in the catalogGitUrl repo to be used.
      type: string
      default: lightwell-pipeline
  results:
    - name: SBOM_URN
      description: URN of the SBOM registered in Trustify.
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: false
    env:
      - name: REQUESTS_CA_BUNDLE
        value: /etc/pki/tls/cert.pem
  steps:
    - name: use-trusted-artifact
      ref:
        resolver: git
        params:
          - name: url
            value: $(params.catalogGitUrl)
          - name: revision
            value: $(params.catalogGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: /var/workdir/extracted
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: caCertPath
          value: /mnt/trusted-ca/$(params.caTrustConfigMapKey)
    - name: run
      image: quay.io/light-castle/slan-cuan:latest
      imagePullPolicy: Always
      args:
        - register
      env:
        - name: SLAN_CUAN_REGISTER_TRUSTIFY_API_URL
          value: $(params.TRUSTIFY_API_URL)
        - name: SLAN_CUAN_REGISTER_SSO_TOKEN_URL
          value: $(params.SSO_TOKEN_URL)
        - name: SLAN_CUAN_REGISTER_SSO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: $(params.SSO_SECRET_NAME)
              key: client-id
        - name: SLAN_CUAN_REGISTER_SSO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: $(params.SSO_SECRET_NAME)
              key: client-secret
        - name: SLAN_CUAN_CA_CERT
          value: $(params.CA_CERT_PATH)
        - name: SLAN_CUAN_REGISTER_ARTIFACT_DIR
          value: /var/workdir/extracted
        - name: SLAN_CUAN_REGISTER_INSECURE
          value: $(params.INSECURE)
        - name: SLAN_CUAN_REGISTER_RETRIES
          value: $(params.RETRIES)
        - name: SLAN_CUAN_TEKTON_RESULTS_DIR
          value: $(step.results)
      volumeMounts:
        - name: ca-cert
          mountPath: /certs
          readOnly: true
  volumes:
    - name: workdir
      emptyDir: {}
    - name: ca-cert
      secret:
        secretName: $(params.CA_CERT_SECRET)
        optional: true
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        optional: true
