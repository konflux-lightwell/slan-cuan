---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: slan-cuan-publish
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/categories: Deploy
    tekton.dev/displayName: "slan-cuan: Publish to Pulp"
    tekton.dev/pipelines.minVersion: "0.50.0"
    tekton.dev/platforms: "linux/amd64"
    tekton.dev/tags: "release,maven,pulp,publish"
spec:
  description: >-
    Publish signed Java artifacts to Pulp repository for distribution.
  params:
    - name: PULP_URL
      description: Pulp instance base URL.
      type: string
    - name: PULP_REPOSITORY
      description: Pulp Maven distribution name.
      type: string
    - name: PULP_DOMAIN
      description: Pulp domain for hosted content API.
      type: string
      default: "lightwell"
    - name: INSECURE
      description: Disable TLS verification (true/false).
      type: string
      default: "false"
    - name: CA_CERT_PATH
      description: Path to the CA certificate file inside the mounted secret.
      type: string
      default: ""
    - name: PULP_AUTH_TYPE
      description: Pulp authentication method (tbr or cert).
      type: string
      default: "tbr"
    - name: PULP_AUTH_SECRET
      description: >-
        K8s Secret name containing TBR credentials
        (keys: username, password).
      type: string
      default: ""
    - name: PULP_CERT_SECRET
      description: >-
        K8s Secret name containing client certificate for
        entitlement cert auth (keys: tls.crt, tls.key).
      type: string
      default: ""
    - name: PULP_USERNAME
      description: Username for pulp auth
      type: string
      default: ""
    - name: PULP_PASSWORD
      description: Password for pulp auth
      type: string
      default: ""
    - name: PULP_CLIENT_CERT_PATH
      description: Path to the client certificate file inside the mounted secret.
      type: string
      default: ""
    - name: PULP_CLIENT_KEY_PATH
      description: Path to the client key file inside the mounted secret.
      type: string
      default: ""
    - name: sourceDataArtifact
      description: Trusted Artifact URI of the extracted artifact directory from slan-cuan-extract.
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifact is stored.
      type: string
      default: "empty"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls.
      type: string
      default: ""
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: "trusted-ca"
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the CA bundle data.
      type: string
      default: "ca-bundle.crt"
    - name: catalogGitUrl
      description: The url to the git repo where the release-service-catalog stepactions are stored.
      type: string
      default: https://github.com/arewm/release-service-catalog.git
    - name: catalogGitRevision
      description: The revision in the catalogGitUrl repo to be used.
      type: string
      default: lightwell-pipeline
  results:
    - name: ARTIFACTS_UPLOADED
      description: Number of artifacts uploaded to Pulp.
    - name: ARTIFACTS_SKIPPED
      description: Number of artifacts skipped during upload.
    - name: PUBLISHED_ARTIFACT_OUTPUTS
      description: >-
        JSON object for Tekton Chains SLSA provenance.
        Contains uri and digest of the published artifacts.
      type: object
      properties:
        uri: {}
        digest: {}
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: false
    # env:
    #   - name: REQUESTS_CA_BUNDLE
    #     value: /etc/pki/tls/cert.pem
  steps:
    - name: use-trusted-artifact
      ref:
        resolver: git
        params:
          - name: url
            value: $(params.catalogGitUrl)
          - name: revision
            value: $(params.catalogGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: /var/workdir/extracted
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: caCertPath
          value: /mnt/trusted-ca/$(params.caTrustConfigMapKey)
    - name: run
      image: quay.io/light-castle/slan-cuan:latest
      imagePullPolicy: Always
      args:
        - --verbose
        - publish
      env:
        - name: SLAN_CUAN_CA_CERT
          value: $(params.CA_CERT_PATH)
        - name: SLAN_CUAN_PULP_USERNAME
          value: $(params.PULP_USERNAME)
        - name: SLAN_CUAN_PULP_PASSWORD
          value: $(params.PULP_PASSWORD)
        - name: SLAN_CUAN_PUBLISH_PULP_URL
          value: $(params.PULP_URL)
        - name: SLAN_CUAN_PUBLISH_PULP_REPOSITORY
          value: $(params.PULP_REPOSITORY)
        - name: SLAN_CUAN_PUBLISH_PULP_DOMAIN
          value: $(params.PULP_DOMAIN)
        - name: SLAN_CUAN_PUBLISH_ARTIFACT_DIR
          value: /var/workdir/extracted
        - name: SLAN_CUAN_PUBLISH_INSECURE
          value: $(params.INSECURE)
        - name: SLAN_CUAN_PUBLISH_PULP_AUTH_TYPE
          value: $(params.PULP_AUTH_TYPE)
        - name: SLAN_CUAN_PUBLISH_PULP_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.PULP_USERNAME)
              key: username
              optional: true
        - name: SLAN_CUAN_PUBLISH_PULP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.PULP_PASSWORD)
              key: password
              optional: true
        - name: SLAN_CUAN_PUBLISH_PULP_CLIENT_CERT
          value: $(params.PULP_CLIENT_CERT_PATH)
        - name: SLAN_CUAN_PUBLISH_PULP_CLIENT_KEY
          value: $(params.PULP_CLIENT_KEY_PATH)
        - name: SLAN_CUAN_TEKTON_RESULTS_DIR
          value: $(step.results)
      volumeMounts:
        - name: client-cert
          mountPath: /certs/client
          readOnly: true
  volumes:
    - name: workdir
      emptyDir: {}
    - name: client-cert
      secret:
        secretName: $(params.PULP_CERT_SECRET)
        optional: true
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        optional: true
